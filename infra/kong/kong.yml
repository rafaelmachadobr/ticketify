_format_version: "3.0"
_transform: true

# ─── Serviços ────────────────────────────────────────────────────────────────
services:
  - name: auth-service
    url: http://auth-service:3001
    routes:
      - name: auth-routes
        paths:
          - /auth
        strip_path: false

  - name: event-service
    url: http://event-service:8080/api
    routes:
      - name: event-routes
        paths:
          - /events
        strip_path: false
      - name: event-admin-routes
        paths:
          - /admin/events
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp

  - name: booking-service
    url: http://booking-service:8020
    routes:
      - name: booking-routes
        paths:
          - /bookings
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp

  - name: search-service
    url: http://search-service:8000
    routes:
      - name: search-routes
        paths:
          - /search
        strip_path: false

# ─── Plugins Globais ─────────────────────────────────────────────────────────

plugins:
  # Extrai claims do JWT e injeta X-User-Id, X-User-Email, X-User-Role nos headers downstream
  - name: jwt-claims-injector

  # Rate limiting global: 100 req/min por IP (anônimos)
  - name: rate-limiting
    config:
      minute: 100
      policy: local
      limit_by: ip
      error_code: 429
      error_message: "Taxa de requisições excedida."

  # OpenTelemetry: Kong → Jaeger
  - name: opentelemetry
    config:
      endpoint: http://jaeger:4318/v1/traces
      resource_attributes:
        service.name: kong-gateway
      sampling_rate: 1.0
      propagation:
        default_format: w3c

# Nota: consumer JWT (ticketify-issuer) e credencial RS256 são registrados
# dinamicamente pelo serviço kong-jwt-setup, que lê a chave de
# apps/auth-service/keys/public.pem. Isso evita chave hardcoded aqui.
