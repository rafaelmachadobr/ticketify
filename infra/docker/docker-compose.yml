services:
  # ─── PostgreSQL: Auth Service ───────────────────────────────────────────────
  postgres-auth:
    image: postgres:16-alpine
    container_name: postgres-auth
    environment:
      POSTGRES_DB: ${POSTGRES_AUTH_DB}
      POSTGRES_USER: ${POSTGRES_AUTH_USER}
      POSTGRES_PASSWORD: ${POSTGRES_AUTH_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    command: >
      postgres
        -c wal_level=logical
        -c max_replication_slots=4
        -c max_wal_senders=4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_AUTH_USER} -d ${POSTGRES_AUTH_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PostgreSQL: Event Service ──────────────────────────────────────────────
  postgres-event:
    image: postgres:16-alpine
    container_name: postgres-event
    environment:
      POSTGRES_DB: ${POSTGRES_EVENT_DB}
      POSTGRES_USER: ${POSTGRES_EVENT_USER}
      POSTGRES_PASSWORD: ${POSTGRES_EVENT_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_event_data:/var/lib/postgresql/data
    command: >
      postgres
        -c wal_level=logical
        -c max_replication_slots=4
        -c max_wal_senders=4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_EVENT_USER} -d ${POSTGRES_EVENT_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PostgreSQL: Booking Service ────────────────────────────────────────────
  postgres-booking:
    image: postgres:16-alpine
    container_name: postgres-booking
    environment:
      POSTGRES_DB: ${POSTGRES_BOOKING_DB}
      POSTGRES_USER: ${POSTGRES_BOOKING_USER}
      POSTGRES_PASSWORD: ${POSTGRES_BOOKING_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_booking_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_BOOKING_USER} -d ${POSTGRES_BOOKING_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Zookeeper ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
      ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME}
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "cub zk-ready localhost:2181 10 2>/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 15s
      retries: 10
      start_period: 30s

  # ─── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: ${KAFKA_ZOOKEEPER_CONNECT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS_ENABLE}
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "cub kafka-ready -b localhost:9092 1 10 2>/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 15s
      retries: 15
      start_period: 60s

  # ─── Elasticsearch ──────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    environment:
      - discovery.type=${ES_DISCOVERY_TYPE}
      - xpack.security.enabled=${ES_XPACK_SECURITY_ENABLED}
      - xpack.security.enrollment.enabled=${ES_XPACK_SECURITY_ENROLLMENT_ENABLED}
      - ES_JAVA_OPTS=${ES_JAVA_OPTS}
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -sf http://localhost:9200/_cluster/health | grep -qv ''"status":"red"''',
        ]
      interval: 20s
      timeout: 10s
      retries: 10

  # ─── Kafka Init: cria tópicos ────────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      [
        "/bin/bash",
        "-c",
        "kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic db.public.events --partitions 1 --replication-factor 1 && kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ticketify.bookings --partitions 1 --replication-factor 1 && echo 'Topicos criados com sucesso'",
      ]
    restart: on-failure

  # ─── Debezium Kafka Connect ─────────────────────────────────────────────────
  debezium:
    image: debezium/connect:2.6
    container_name: debezium
    depends_on:
      kafka:
        condition: service_healthy
      postgres-event:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: ${DEBEZIUM_BOOTSTRAP_SERVERS}
      GROUP_ID: ${DEBEZIUM_GROUP_ID}
      CONFIG_STORAGE_TOPIC: ${DEBEZIUM_CONFIG_STORAGE_TOPIC}
      OFFSET_STORAGE_TOPIC: ${DEBEZIUM_OFFSET_STORAGE_TOPIC}
      STATUS_STORAGE_TOPIC: ${DEBEZIUM_STATUS_STORAGE_TOPIC}
      CONFIG_STORAGE_REPLICATION_FACTOR: ${DEBEZIUM_CONFIG_STORAGE_REPLICATION_FACTOR}
      OFFSET_STORAGE_REPLICATION_FACTOR: ${DEBEZIUM_OFFSET_STORAGE_REPLICATION_FACTOR}
      STATUS_STORAGE_REPLICATION_FACTOR: ${DEBEZIUM_STATUS_STORAGE_REPLICATION_FACTOR}
      CONNECT_KEY_CONVERTER: ${DEBEZIUM_CONNECT_KEY_CONVERTER}
      CONNECT_VALUE_CONVERTER: ${DEBEZIUM_CONNECT_VALUE_CONVERTER}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ─── Debezium Init: registra conector ────────────────────────────────────────
  debezium-init:
    image: curlimages/curl:8.7.1
    container_name: debezium-init
    depends_on:
      debezium:
        condition: service_healthy
    volumes:
      - ../debezium:/debezium
    entrypoint:
      - sh
      - -c
      - |
        CODE=$$(curl -s -o /tmp/res.txt -w '%{http_code}' \
          -X POST http://debezium:8083/connectors \
          -H 'Content-Type: application/json' \
          -d @/debezium/postgres-connector.json)
        if [ "$$CODE" = "201" ]; then
          echo "Conector registrado com sucesso"
        elif [ "$$CODE" = "409" ]; then
          echo "Conector ja existe, nada a fazer"
        else
          echo "Falha ao registrar conector: HTTP $$CODE"
          cat /tmp/res.txt
          exit 1
        fi
    restart: on-failure

  # ─── MinIO ──────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO Init: criar bucket ticketify-media ────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/ticketify-media &&
        mc anonymous set download local/ticketify-media &&
        echo 'Bucket ticketify-media criado com sucesso'
      "
    restart: on-failure

  # ─── Jaeger (All-in-one) ────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "14268:14268"
    environment:
      COLLECTOR_OTLP_ENABLED: ${JAEGER_COLLECTOR_OTLP_ENABLED}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686/ > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kong Database ──────────────────────────────────────────────────────────
  postgres-kong:
    image: postgres:16-alpine
    container_name: postgres-kong
    environment:
      POSTGRES_DB: ${POSTGRES_KONG_DB}
      POSTGRES_USER: ${POSTGRES_KONG_USER}
      POSTGRES_PASSWORD: ${POSTGRES_KONG_PASSWORD}
    volumes:
      - postgres_kong_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_KONG_USER} -d ${POSTGRES_KONG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kong Migrations ────────────────────────────────────────────────────────
  # Usa a imagem base (sem plugin customizado) só para rodar as migrations
  kong-migrations:
    image: kong:3.7-ubuntu
    container_name: kong-migrations
    depends_on:
      postgres-kong:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres-kong
      KONG_PG_DATABASE: ${POSTGRES_KONG_DB}
      KONG_PG_USER: ${POSTGRES_KONG_USER}
      KONG_PG_PASSWORD: ${POSTGRES_KONG_PASSWORD}
    command: kong migrations bootstrap
    restart: on-failure

  # ─── Kong API Gateway ───────────────────────────────────────────────────────
  kong:
    build:
      context: ../kong
      dockerfile: Dockerfile
    image: ticketify-kong:latest
    pull_policy: build
    container_name: kong
    depends_on:
      postgres-kong:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
      - "8443:8443"
      - "8444:8444"
    volumes:
      - ../kong/kong.yml:/etc/kong/kong.yml:ro
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres-kong
      KONG_PG_DATABASE: ${POSTGRES_KONG_DB}
      KONG_PG_USER: ${POSTGRES_KONG_USER}
      KONG_PG_PASSWORD: ${POSTGRES_KONG_PASSWORD}
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002
      KONG_ADMIN_GUI_URL: ${KONG_ADMIN_GUI_URL}
      KONG_PLUGINS: ${KONG_PLUGINS}
      KONG_TRACING_INSTRUMENTATIONS: all
      KONG_TRACING_SAMPLING_RATE: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "kong health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Auth Service (NestJS) ──────────────────────────────────────────────────
  auth-service:
    build:
      context: ../../apps/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    depends_on:
      postgres-auth:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${AUTH_NODE_ENV}
      PORT: ${AUTH_PORT}
      DB_HOST: postgres-auth
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_AUTH_DB}
      DB_USER: ${POSTGRES_AUTH_USER}
      DB_PASS: ${POSTGRES_AUTH_PASSWORD}
      JWT_PRIVATE_KEY_PATH: ${AUTH_JWT_PRIVATE_KEY_PATH}
      JWT_PUBLIC_KEY_PATH: ${AUTH_JWT_PUBLIC_KEY_PATH}
      JWT_ACCESS_EXPIRES_IN: ${AUTH_JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${AUTH_JWT_REFRESH_EXPIRES_IN}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_ENDPOINT_HTTP}
      OTEL_SERVICE_NAME: ${AUTH_OTEL_SERVICE_NAME}
    volumes:
      - ../../apps/auth-service/src:/app/src
      - /app/node_modules
    restart: unless-stopped

  # ─── Event Service (Laravel) ────────────────────────────────────────────────
  event-service:
    build:
      context: ../../apps/event-service
      dockerfile: Dockerfile
    container_name: event-service
    depends_on:
      postgres-event:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ../../apps/event-service/app:/app/app
      - ../../apps/event-service/routes:/app/routes
      - ../../apps/event-service/config:/app/config
      - ../../apps/event-service/database:/app/database
    environment:
      APP_ENV: ${EVENT_APP_ENV}
      APP_DEBUG: ${EVENT_APP_DEBUG}
      APP_KEY: ${EVENT_SERVICE_APP_KEY}
      DB_CONNECTION: ${EVENT_DB_CONNECTION}
      DB_HOST: postgres-event
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_EVENT_DB}
      DB_USERNAME: ${POSTGRES_EVENT_USER}
      DB_PASSWORD: ${POSTGRES_EVENT_PASSWORD}
      CACHE_STORE: ${EVENT_CACHE_STORE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FILESYSTEM_DISK: ${EVENT_FILESYSTEM_DISK}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_DEFAULT_REGION: ${EVENT_AWS_DEFAULT_REGION}
      AWS_BUCKET: ${EVENT_AWS_BUCKET}
      AWS_ENDPOINT: ${EVENT_AWS_ENDPOINT}
      AWS_USE_PATH_STYLE_ENDPOINT: ${EVENT_AWS_USE_PATH_STYLE_ENDPOINT}
      AWS_URL: ${EVENT_AWS_URL}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_ENDPOINT_HTTP}
      OTEL_SERVICE_NAME: ${EVENT_OTEL_SERVICE_NAME}
    restart: unless-stopped

  # ─── Search Service ─────────────────────────────────────────────────────────
  search-service:
    build:
      context: ../../apps/search-service
      dockerfile: Dockerfile
    image: ticketify-search-service:latest
    pull_policy: build
    container_name: search-service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8010:8000"
    environment:
      ELASTICSEARCH_URL: ${SEARCH_ELASTICSEARCH_URL}
      ELASTICSEARCH_INDEX: ${SEARCH_ELASTICSEARCH_INDEX}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_ENDPOINT_GRPC}
      SERVICE_NAME: ${SEARCH_OTEL_SERVICE_NAME}
    volumes:
      - ../../apps/search-service:/app
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # ─── CDC Service (Spring Boot) ──────────────────────────────────────────────
  cdc-service:
    build:
      context: ../../apps/cdc-service
      dockerfile: Dockerfile
    container_name: cdc-service
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${CDC_KAFKA_BOOTSTRAP_SERVERS}
      ELASTICSEARCH_URL: ${CDC_ELASTICSEARCH_URL}
      ELASTICSEARCH_INDEX: ${CDC_ELASTICSEARCH_INDEX}
      KAFKA_TOPIC_EVENTS: ${CDC_KAFKA_TOPIC_EVENTS}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_ENDPOINT_GRPC}
      OTEL_SERVICE_NAME: ${CDC_OTEL_SERVICE_NAME}
      OTEL_METRICS_EXPORTER: ${CDC_OTEL_METRICS_EXPORTER}
      OTEL_LOGS_EXPORTER: ${CDC_OTEL_LOGS_EXPORTER}
    restart: unless-stopped

  # ─── Booking Service (Go) ───────────────────────────────────────────────────
  booking-service:
    build:
      context: ../../apps/booking-service
      dockerfile: Dockerfile
    container_name: booking-service
    depends_on:
      postgres-booking:
        condition: service_healthy
      postgres-event:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8020:8020"
    environment:
      PORT: ${BOOKING_PORT}
      BOOKING_DB_URL: postgres://${POSTGRES_BOOKING_USER}:${POSTGRES_BOOKING_PASSWORD}@postgres-booking:5432/${POSTGRES_BOOKING_DB}
      EVENT_DB_URL: postgres://${POSTGRES_EVENT_USER}:${POSTGRES_EVENT_PASSWORD}@postgres-event:5432/${POSTGRES_EVENT_DB}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: ${BOOKING_KAFKA_BROKERS}
      KAFKA_TOPIC_BOOKING: ${BOOKING_KAFKA_TOPIC}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_ENDPOINT_HTTP}
      OTEL_SERVICE_NAME: ${BOOKING_OTEL_SERVICE_NAME}
    restart: unless-stopped

  # ─── Frontend (Next.js) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      AUTH_SERVICE_URL: ${FRONTEND_AUTH_SERVICE_URL}
      EVENT_SERVICE_URL: ${FRONTEND_EVENT_SERVICE_URL}
      SEARCH_SERVICE_URL: ${FRONTEND_SEARCH_SERVICE_URL}
      BOOKING_SERVICE_URL: ${FRONTEND_BOOKING_SERVICE_URL}
    volumes:
      - ../../frontend/src:/app/src
      - ../../frontend/public:/app/public
      - ../../frontend/next.config.ts:/app/next.config.ts
      - ../../frontend/tailwind.config.ts:/app/tailwind.config.ts
      - ../../frontend/tsconfig.json:/app/tsconfig.json
      - ../../frontend/postcss.config.mjs:/app/postcss.config.mjs
      - /app/node_modules
      - /app/.next
    depends_on:
      - auth-service
      - event-service
      - search-service
    restart: unless-stopped

  # ─── Kong Deck: aplica kong.yml via Admin API após Kong subir ────────────────
  kong-deck:
    image: kong/deck:v1.40.3
    container_name: kong-deck
    depends_on:
      kong:
        condition: service_healthy
    volumes:
      - ../kong/kong.yml:/etc/kong/kong.yml:ro
    command: >
      gateway sync /etc/kong/kong.yml
        --kong-addr http://kong:8001
        --skip-ca-certificates
    restart: on-failure

volumes:
  postgres_auth_data:
  postgres_event_data:
  postgres_booking_data:
  postgres_kong_data:
  redis_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  elasticsearch_data:
  minio_data:

networks:
  default:
    name: ticketify-network
