spring.application.name=cdc-service
server.port=8080

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
spring.kafka.consumer.group-id=cdc-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.listener.ack-mode=manual_immediate

# Elasticsearch
elasticsearch.url=${ELASTICSEARCH_URL:http://elasticsearch:9200}
elasticsearch.index=${ELASTICSEARCH_INDEX:events}

# Kafka topic
kafka.topic.events=${KAFKA_TOPIC_EVENTS:db.public.events}
